<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        background: 'oklch(0.18 0.018 230)',
        foreground: 'oklch(0.92 0.022 85)',

<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<main class="bg-background text-foreground min-h-screen flex items-center justify-center">
